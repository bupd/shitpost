name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: golang:1.25-bookworm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Task
        run: go install github.com/go-task/task/v3/cmd/task@v3.45.4

      - name: Run task CI
        run: task ci
